    padding: 1px 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    margin-left: 8px;
  }}
  .legend {{
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: var(--muted);
    align-items: center;
    flex-shrink: 0;
  }}
  .legend-dot {{
    width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px;
  }}

  /* ── Summary cards ── */
  .cards {{
    display: flex;
    gap: 12px;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border2);
  }}
  .card {{
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 20px;
    min-width: 130px;
  }}
  .card--warn {{ border-color: var(--warn); }}
  .card-val {{
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }}
  .card-lbl {{ font-size: 11px; color: var(--muted); margin-top: 2px; }}
  .ok-text   {{ color: var(--ok); }}
  .warn-text {{ color: var(--warn); }}
  .crit-text {{ color: var(--crit); }}

  /* ── Section ── */
  .section {{ padding: 24px 32px; }}
  .section + .section {{ border-top: 1px solid var(--border2); }}
  .section-title {{
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }}

  /* ── Tables ── */
  table {{
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }}
  th {{
    background: var(--bg3);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }}
  td {{ padding: 7px 12px; border-bottom: 1px solid var(--border2); vertical-align: middle; }}

  .node-row {{
    background: var(--node-bg);
    cursor: pointer;
    transition: background 0.15s;
  }}
  .node-row:hover {{ background: var(--bg3); }}
  .warn-row {{ border-left: 3px solid var(--warn); }}
  .node-name {{
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }}
  .chevron {{
    display: inline-block;
    font-size: 9px;
    color: var(--muted);
    margin-right: 6px;
    transition: transform 0.2s;
  }}
  .node-row.open .chevron {{ transform: rotate(90deg); }}

  .vm-group {{ background: var(--vm-bg); }}
  .vm-group.hidden {{ display: none; }}
  .vm-table {{ margin: 4px 0 4px 24px; width: calc(100% - 24px); }}
  .vm-table td {{ border-color: transparent; padding: 4px 12px; }}
  .vm-indent {{ padding-left: 28px !important; }}
  .vm-ns {{
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-right: 8px;
  }}
  .vm-name {{
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
  }}
  .vm-node {{
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }}

  .total-row td {{
    font-family: var(--mono);
    font-weight: 600;
    color: var(--text);
    background: var(--bg3);
    border-top: 1px solid var(--border);
  }}

  /* ── Badges ── */
  .badge {{
    display: inline-block;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    font-family: var(--mono);
    white-space: nowrap;
  }}
  .badge.ready         {{ background: #1a3a1f; color: var(--ok);   border: 1px solid #2ea043; }}
  .badge.notready      {{ background: #3a1a1a; color: var(--crit); border: 1px solid #da3633; }}
  .badge.unschedulable {{ background: #3a2f1a; color: var(--warn); border: 1px solid #9e6a03; }}
  .badge.unknown       {{ background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }}
  .badge.running       {{ background: #1a3a1f; color: var(--ok);   border: 1px solid #2ea043; }}
  .badge.other         {{ background: #3a2f1a; color: var(--warn); border: 1px solid #9e6a03; }}

  /* ── Progress bars ── */
  .bar-wrap {{
    display: inline-block;
    width: 80px;
    height: 6px;
    background: var(--bg3);
    border-radius: 3px;
    overflow: hidden;
    vertical-align: middle;
    margin-right: 6px;
    border: 1px solid var(--border2);
  }}
  .bar {{
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }}
  .bar.ok   {{ background: var(--ok); }}
  .bar.warn {{ background: var(--warn); }}
  .bar.crit {{ background: var(--crit); }}

  .pct {{ font-family: var(--mono); font-size: 11px; }}
  .pct.ok   {{ color: var(--ok); }}
  .pct.warn {{ color: var(--warn); }}
  .pct.crit {{ color: var(--crit); }}

  .pct-cell {{ font-family: var(--mono); font-size: 11px; font-weight: 600; }}
  .pct-cell.ok   {{ color: var(--ok); }}
  .pct-cell.warn {{ color: var(--warn); }}
  .pct-cell.crit {{ color: var(--crit); }}

  /* ── Warnings panel ── */
  .warn-panel {{
    margin: 0 32px 24px;
    background: #1c1a13;
    border: 1px solid var(--warn);
    border-radius: 8px;
    padding: 16px 20px;
  }}
  .warn-panel-title {{
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--warn);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }}
  .warn-item {{
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 4px 0;
    font-family: var(--mono);
    font-size: 12px;
  }}
  .warn-item-node {{ color: var(--text); min-width: 200px; }}
  .warn-chip {{
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }}
  .warn-chip.cpu {{ background: #1a2a3a; color: var(--accent); border: 1px solid var(--accent2); }}
  .warn-chip.mem {{ background: #3a1a1a; color: var(--crit);   border: 1px solid #da3633; }}
  .warn-chip.wmem {{ background: #3a2f1a; color: var(--warn);  border: 1px solid #9e6a03; }}

  footer {{
    padding: 16px 32px;
    border-top: 1px solid var(--border2);
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>OCP<span>/</span>Virt &mdash; Overcommit Report</h1>
    <div class="header-meta">
      Wygenerowano: {now}
      {filter_info}
    </div>
  </div>
  <div class="legend">
    <span><span class="legend-dot" style="background:var(--ok)"></span>OK</span>
