#!/usr/bin/env python3
"""
OCP Virtualization - Memory & CPU Overcommit Analyzer

Uzycie:
  python3 virt_overcommit.py
  python3 virt_overcommit.py --namespace produkcja
  python3 virt_overcommit.py --node worker-03
  python3 virt_overcommit.py --warn-cpu 80 --warn-mem 90
  python3 virt_overcommit.py --html raport.html
"""

import subprocess
import json
import sys
import argparse
import datetime
import os
from collections import defaultdict

RED    = "\033[91m"
YELLOW = "\033[93m"
GREEN  = "\033[92m"
CYAN   = "\033[96m"
BOLD   = "\033[1m"
RESET  = "\033[0m"


def color_pct(pct, warn, crit=100):
    if pct >= crit:
        return RED + BOLD + "{:.1f}%".format(pct) + RESET
    elif pct >= warn:
        return YELLOW + "{:.1f}%".format(pct) + RESET
    return GREEN + "{:.1f}%".format(pct) + RESET


def parse_memory_to_mib(raw):
    if not raw or raw in ("0", ""):
        return 0.0
    raw = str(raw).strip()
    try:
        if raw.endswith("Ki"):
            return float(raw[:-2]) / 1024
        elif raw.endswith("Mi"):
            return float(raw[:-2])
        elif raw.endswith("Gi"):
            return float(raw[:-2]) * 1024
        elif raw.endswith("Ti"):
            return float(raw[:-2]) * 1024 * 1024
        elif raw.endswith("K") or raw.endswith("k"):
            return float(raw[:-1]) / 1024
        elif raw.endswith("M"):
            return float(raw[:-1])
        elif raw.endswith("G"):
            return float(raw[:-1]) * 1024
        else:
            return float(raw) / (1024 * 1024)
    except ValueError:
        return 0.0


def parse_cpu_to_mcores(raw):
    if not raw or raw in ("0", ""):
        return 0.0
    raw = str(raw).strip()
    try:
        if raw.endswith("m"):
            return float(raw[:-1])
        else:
            return float(raw) * 1000
    except ValueError:
        return 0.0


def fmt_mib(mib):
    if mib >= 1024:
        return "{:.1f} GiB".format(mib / 1024)
    return "{:.0f} MiB".format(mib)


def fmt_cpu(mcores):
    if mcores >= 1000:
        return "{:.2f} cores".format(mcores / 1000)
    return "{:.0f}m".format(mcores)


def oc_get(resource, namespace=None):
    cmd = ["oc", "get", resource, "-o", "json"]
    if namespace:
        cmd += ["-n", namespace]
    else:
        cmd += ["-A"]
    try:
        result = subprocess.run(cmd, capture_output=True, text=True, timeout=60)
        if result.returncode != 0:
            print(RED + "Blad oc: " + result.stderr.strip() + RESET, file=sys.stderr)
            return None
        return json.loads(result.stdout)
    except subprocess.TimeoutExpired:
        print(RED + "Timeout podczas pobierania " + resource + RESET, file=sys.stderr)
        return None
    except json.JSONDecodeError as e:
        print(RED + "JSON decode error: " + str(e) + RESET, file=sys.stderr)
        return None


def get_nodes():
    data = oc_get("nodes")
    if not data:
        return {}
    nodes = {}
    for item in data.get("items", []):
        name   = item["metadata"]["name"]
        labels = item["metadata"].get("labels", {})
        alloc  = item["status"].get("allocatable", {})
        roles  = [k.split("/")[-1] for k in labels if k.startswith("node-role.kubernetes.io/")]
        if "master" in roles or "control-plane" in roles:
            continue
        conditions    = item["status"].get("conditions", [])
        ready         = any(c["type"] == "Ready" and c["status"] == "True" for c in conditions)
        unschedulable = item["spec"].get("unschedulable", False)
        taints        = item["spec"].get("taints", [])
        nodes[name] = {
            "allocatable_cpu_m":   parse_cpu_to_mcores(alloc.get("cpu", "0")),
            "allocatable_mem_mib": parse_memory_to_mib(alloc.get("memory", "0")),
            "roles":               roles,
            "ready":               ready,
            "unschedulable":       unschedulable,
            "taints":              taints,
        }
    return nodes


def get_vmis(filter_ns=None):
    data = oc_get("virtualmachineinstances", namespace=filter_ns)
    if not data:
        return []
    vmis = []
    for item in data.get("items", []):
        meta      = item["metadata"]
        spec      = item.get("spec", {})
        status    = item.get("status", {})
        domain    = spec.get("domain", {})
        cpu_obj   = domain.get("cpu", {})
        cpu_cores = cpu_obj.get("cores", 1) * cpu_obj.get("sockets", 1) * cpu_obj.get("threads", 1)
        resources  = domain.get("resources", {})
        memory_raw = (
            domain.get("memory", {}).get("guest")
            or resources.get("requests", {}).get("memory")
            or resources.get("limits", {}).get("memory")
            or "0"
        )
        vmis.append({
            "name":      meta["name"],
            "namespace": meta["namespace"],
            "node":      status.get("nodeName", "<unscheduled>"),
            "phase":     status.get("phase", "Unknown"),
            "cpu_m":     cpu_cores * 1000,
            "mem_mib":   parse_memory_to_mib(memory_raw),
        })
    return vmis


def analyze(vmis, nodes, filter_node=None, warn_cpu=80, warn_mem=80):
    node_data = defaultdict(lambda: {"cpu_m": 0.0, "mem_mib": 0.0, "vms": []})
    ns_data   = defaultdict(lambda: {"cpu_m": 0.0, "mem_mib": 0.0, "vms": []})
    for vmi in vmis:
        node = vmi["node"]
        if filter_node and node != filter_node:
            continue
        node_data[node]["cpu_m"]   += vmi["cpu_m"]
        node_data[node]["mem_mib"] += vmi["mem_mib"]
        node_data[node]["vms"].append(vmi)
        ns_data[vmi["namespace"]]["cpu_m"]   += vmi["cpu_m"]
        ns_data[vmi["namespace"]]["mem_mib"] += vmi["mem_mib"]
        ns_data[vmi["namespace"]]["vms"].append(vmi)
    return node_data, ns_data


# ── Terminal output ───────────────────────────────────────────────────────────

def print_separator(char="─", width=100):
    print(char * width)


def print_node_report(node_data, nodes, warn_cpu, warn_mem):
    print("\n" + BOLD + CYAN + "=" * 100 + RESET)
    print(BOLD + CYAN + "  OVERCOMMIT PER WORKER NODE" + RESET)
    print(BOLD + CYAN + "=" * 100 + RESET)
    hdr = "{:<32} {:<14} {:>6}  {:>12} {:>10} {:>8}  {:>12} {:>12} {:>8}".format(
        "NODE", "STATUS", "VMs", "CPU commit", "CPU alloc", "CPU %",
        "MEM commit", "MEM alloc", "MEM %")
    print(BOLD + hdr + RESET)
    print_separator()
    all_nodes = sorted(set(nodes.keys()) | set(node_data.keys()))
    for node_name in all_nodes:
        nd = node_data.get(node_name, {"cpu_m": 0, "mem_mib": 0, "vms": []})
        ni = nodes.get(node_name)
        if not ni:
            print("{:<32} {:<14} {:>6}  {:>12} {:>10} {:>8}  {:>12} {:>12} {:>8}".format(
                node_name, "unknown", len(nd["vms"]),
                fmt_cpu(nd["cpu_m"]), "?", "?",
                fmt_mib(nd["mem_mib"]), "?", "?"))
            continue
        alloc_cpu = ni["allocatable_cpu_m"]
        alloc_mem = ni["allocatable_mem_mib"]
        cpu_pct   = (nd["cpu_m"]   / alloc_cpu  * 100) if alloc_cpu  > 0 else 0
        mem_pct   = (nd["mem_mib"] / alloc_mem * 100) if alloc_mem > 0 else 0
        if not ni["ready"]:
            status_str = RED + "NotReady" + RESET
        elif ni["unschedulable"]:
            status_str = YELLOW + "Unschedulable" + RESET
        else:
            status_str = GREEN + "Ready" + RESET
        print("{:<32} {:<23} {:>6}  {:>12} {:>10} {:>18}  {:>12} {:>12} {:>18}".format(
            node_name, status_str, len(nd["vms"]),
            fmt_cpu(nd["cpu_m"]), fmt_cpu(alloc_cpu), color_pct(cpu_pct, warn_cpu),
            fmt_mib(nd["mem_mib"]), fmt_mib(alloc_mem), color_pct(mem_pct, warn_mem)))
        for vmi in sorted(nd["vms"], key=lambda x: x["mem_mib"], reverse=True):
            phase_col = GREEN if vmi["phase"] == "Running" else YELLOW
            print("  {} {:<28} {}{:<40}{}  CPU: {:<10} MEM: {}".format(
                "└─", vmi["namespace"],
                phase_col, vmi["name"], RESET,
                fmt_cpu(vmi["cpu_m"]), fmt_mib(vmi["mem_mib"])))
    print_separator()


def print_namespace_report(ns_data, warn_cpu, warn_mem):
    print("\n" + BOLD + CYAN + "=" * 100 + RESET)
    print(BOLD + CYAN + "  OVERCOMMIT PER NAMESPACE" + RESET)
    print(BOLD + CYAN + "=" * 100 + RESET)
    print(BOLD + "{:<38} {:>6}  {:>12} {:>14}".format("NAMESPACE", "VMs", "CPU commit", "MEM commit") + RESET)
    print_separator()
    total_cpu = total_mem = 0.0
    for ns in sorted(ns_data.keys()):
        nd = ns_data[ns]
        total_cpu += nd["cpu_m"]
        total_mem += nd["mem_mib"]
        print("{:<38} {:>6}  {:>12} {:>14}".format(
            ns, len(nd["vms"]), fmt_cpu(nd["cpu_m"]), fmt_mib(nd["mem_mib"])))
        for vmi in sorted(nd["vms"], key=lambda x: x["mem_mib"], reverse=True):
            phase_col = GREEN if vmi["phase"] == "Running" else YELLOW
            node_info = "@ " + vmi["node"] if vmi["node"] != "<unscheduled>" else RED + "unscheduled" + RESET
            print("  {} {}{:<42}{}  CPU: {:<10} MEM: {:<14} {}".format(
                "└─", phase_col, vmi["name"], RESET,
                fmt_cpu(vmi["cpu_m"]), fmt_mib(vmi["mem_mib"]), node_info))
    print_separator()
    print("{:<38} {:>6}  {:>12} {:>14}".format(
        "TOTAL", sum(len(nd["vms"]) for nd in ns_data.values()),
        fmt_cpu(total_cpu), fmt_mib(total_mem)))


def print_overcommit_warnings(node_data, nodes, warn_cpu, warn_mem):
    warnings = []
    for node_name, nd in node_data.items():
        ni = nodes.get(node_name)
        if not ni:
            continue
        cpu_pct = (nd["cpu_m"]   / ni["allocatable_cpu_m"]  * 100) if ni["allocatable_cpu_m"]  > 0 else 0
        mem_pct = (nd["mem_mib"] / ni["allocatable_mem_mib"] * 100) if ni["allocatable_mem_mib"] > 0 else 0
        if cpu_pct >= warn_cpu or mem_pct >= warn_mem:
            warnings.append((node_name, cpu_pct, mem_pct, nd))
    if not warnings:
        return
    print("\n" + BOLD + RED + "=" * 100 + RESET)
    print(BOLD + RED + "  OSTRZEZENIA O OVERCOMMIT" + RESET)
    print(BOLD + RED + "=" * 100 + RESET)
    for node_name, cpu_pct, mem_pct, nd in sorted(warnings, key=lambda x: x[2], reverse=True):
        print("  " + RED + ">" + RESET + " " + BOLD + node_name + RESET)
        if cpu_pct >= warn_cpu:
            print("    CPU overcommit: " + color_pct(cpu_pct, warn_cpu))
        if mem_pct >= warn_mem:
            print("    MEM overcommit: " + color_pct(mem_pct, warn_mem))
    print_separator()


# ── HTML output ───────────────────────────────────────────────────────────────

def pct_class(pct, warn, crit=100):
    if pct >= crit:
        return "crit"
    elif pct >= warn:
        return "warn"
    return "ok"


def bar_html(pct, warn):
    cls   = pct_class(pct, warn)
    width = min(pct, 100)
    return (
        '<div class="bar-wrap">'
        '<div class="bar ' + cls + '" style="width:' + "{:.1f}".format(width) + '%"></div>'
        '</div>'
        '<span class="pct ' + cls + '">' + "{:.1f}".format(pct) + '%</span>'
    )


def node_status_badge(ni):
    if not ni:
        return '<span class="badge unknown">unknown</span>'
    if not ni["ready"]:
        return '<span class="badge notready">NotReady</span>'
    if ni["unschedulable"]:
        return '<span class="badge unschedulable">Unschedulable</span>'
    return '<span class="badge ready">Ready</span>'


def phase_badge(phase):
    cls = "running" if phase == "Running" else "other"
    return '<span class="badge ' + cls + '">' + phase + '</span>'


def warn_chips_html(node_name, node_data, nodes, warn_cpu, warn_mem):
    nd = node_data.get(node_name, {"cpu_m": 0, "mem_mib": 0, "vms": []})
    ni = nodes.get(node_name)
    if not ni:
        return ""
    cpu_pct = (nd["cpu_m"]   / ni["allocatable_cpu_m"]  * 100) if ni["allocatable_cpu_m"]  > 0 else 0
    mem_pct = (nd["mem_mib"] / ni["allocatable_mem_mib"] * 100) if ni["allocatable_mem_mib"] > 0 else 0
    chips = ""
    if cpu_pct >= warn_cpu:
        chips += '<span class="warn-chip cpu">CPU {:.1f}%</span>'.format(cpu_pct)
    if mem_pct >= 100:
        chips += '<span class="warn-chip mem">MEM {:.1f}%</span>'.format(mem_pct)
    elif mem_pct >= warn_mem:
        chips += '<span class="warn-chip wmem">MEM {:.1f}%</span>'.format(mem_pct)
    return chips


