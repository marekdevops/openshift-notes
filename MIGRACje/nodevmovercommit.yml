def generate_html(node_data, ns_data, nodes, warn_cpu, warn_mem, filter_node, filter_ns):
    now       = datetime.datetime.now().strftime("%Y-%m-%d %H:%M:%S")
    all_nodes = sorted(set(nodes.keys()) | set(node_data.keys()))

    # summary
    total_vms  = sum(len(nd["vms"]) for nd in node_data.values())
    total_nodes = len(nodes)
    warn_nodes  = []
    for nn in all_nodes:
        nd = node_data.get(nn, {"cpu_m": 0, "mem_mib": 0, "vms": []})
        ni = nodes.get(nn)
        if not ni:
            continue
        cpu_pct = (nd["cpu_m"]   / ni["allocatable_cpu_m"]  * 100) if ni["allocatable_cpu_m"]  > 0 else 0
        mem_pct = (nd["mem_mib"] / ni["allocatable_mem_mib"] * 100) if ni["allocatable_mem_mib"] > 0 else 0
        if cpu_pct >= warn_cpu or mem_pct >= warn_mem:
            warn_nodes.append(nn)

    warn_card_cls = "card card--warn" if warn_nodes else "card"
    warn_val_cls  = "card-val warn-text" if warn_nodes else "card-val ok-text"

    cards_html = (
        '<div class="cards">'
        '<div class="card"><div class="card-val">' + str(total_nodes) + '</div>'
        '<div class="card-lbl">Worker nodes</div></div>'
        '<div class="card"><div class="card-val">' + str(total_vms) + '</div>'
        '<div class="card-lbl">VM instancji</div></div>'
        '<div class="' + warn_card_cls + '"><div class="' + warn_val_cls + '">' + str(len(warn_nodes)) + '</div>'
        '<div class="card-lbl">Nodow z overcommit</div></div>'
        '<div class="card"><div class="card-val">' + "{:.0f}% / {:.0f}%".format(warn_cpu, warn_mem) + '</div>'
        '<div class="card-lbl">Prog CPU / MEM</div></div>'
        '</div>'
    )

    # warn panel
    if warn_nodes:
        items = ""
        for nn in warn_nodes:
            items += (
                '<div class="warn-item">'
                '<span class="warn-item-node">&#9658; ' + nn + '</span>'
                + warn_chips_html(nn, node_data, nodes, warn_cpu, warn_mem) +
                '</div>'
            )
        warn_panel = (
            '<div class="warn-panel">'
            '<div class="warn-panel-title">&#9888; '
            'Wezly przekraczajace progi overcommit</div>'
            + items +
            '</div>'
        )
    else:
        warn_panel = ""

    # node table rows
    node_rows = ""
    for node_name in all_nodes:
        nd = node_data.get(node_name, {"cpu_m": 0, "mem_mib": 0, "vms": []})
        ni = nodes.get(node_name)
        if not ni:
            node_rows += (
                '<tr class="node-row">'
                '<td class="node-name">' + node_name + '</td>'
                '<td>' + node_status_badge(None) + '</td>'
                '<td>' + str(len(nd["vms"])) + '</td>'
                '<td>' + fmt_cpu(nd["cpu_m"]) + '</td><td>-</td><td>-</td><td>-</td>'
                '<td>' + fmt_mib(nd["mem_mib"]) + '</td><td>-</td><td>-</td><td>-</td>'
                '</tr>'
            )
            continue

        alloc_cpu = ni["allocatable_cpu_m"]
        alloc_mem = ni["allocatable_mem_mib"]
        cpu_pct   = (nd["cpu_m"]   / alloc_cpu  * 100) if alloc_cpu  > 0 else 0
        mem_pct   = (nd["mem_mib"] / alloc_mem * 100) if alloc_mem > 0 else 0
        row_cls   = "node-row warn-row" if (cpu_pct >= warn_cpu or mem_pct >= warn_mem) else "node-row"

        vm_rows = ""
        for vmi in sorted(nd["vms"], key=lambda x: x["mem_mib"], reverse=True):
            vm_rows += (
                '<tr class="vm-row">'
                '<td colspan="2" class="vm-indent">'
                '<span class="vm-ns">' + vmi["namespace"] + '</span>'
                '<span class="vm-name">' + vmi["name"] + '</span>'
                '</td>'
                '<td>' + phase_badge(vmi["phase"]) + '</td>'
                '<td>' + fmt_cpu(vmi["cpu_m"]) + '</td><td>-</td><td>-</td><td>-</td>'
                '<td>' + fmt_mib(vmi["mem_mib"]) + '</td><td>-</td><td>-</td><td>-</td>'
                '</tr>'
            )

        node_rows += (
            '<tr class="' + row_cls + '" onclick="toggleVMs(this)">'
            '<td class="node-name"><span class="chevron">&#9654;</span> ' + node_name + '</td>'
            '<td>' + node_status_badge(ni) + '</td>'
            '<td>' + str(len(nd["vms"])) + '</td>'
            '<td>' + fmt_cpu(nd["cpu_m"]) + '</td>'
            '<td>' + fmt_cpu(alloc_cpu) + '</td>'
            '<td>' + bar_html(cpu_pct, warn_cpu) + '</td>'
            '<td class="pct-cell ' + pct_class(cpu_pct, warn_cpu) + '">' + "{:.1f}%".format(cpu_pct) + '</td>'
            '<td>' + fmt_mib(nd["mem_mib"]) + '</td>'
            '<td>' + fmt_mib(alloc_mem) + '</td>'
            '<td>' + bar_html(mem_pct, warn_mem) + '</td>'
            '<td class="pct-cell ' + pct_class(mem_pct, warn_mem) + '">' + "{:.1f}%".format(mem_pct) + '</td>'
            '</tr>'
            '<tr class="vm-group hidden">'
            '<td colspan="11"><table class="vm-table">' + vm_rows + '</table></td>'
            '</tr>'
        )

    # namespace table rows
    ns_rows    = ""
    total_cpu  = total_mem = 0.0
    for ns in sorted(ns_data.keys()):
        nd = ns_data[ns]
        total_cpu += nd["cpu_m"]
        total_mem += nd["mem_mib"]
        vm_rows = ""
        for vmi in sorted(nd["vms"], key=lambda x: x["mem_mib"], reverse=True):
            node_txt = vmi["node"] if vmi["node"] != "<unscheduled>" else "&#9888; unscheduled"
            vm_rows += (
                '<tr class="vm-row">'
                '<td class="vm-indent"><span class="vm-name">' + vmi["name"] + '</span></td>'
                '<td>' + phase_badge(vmi["phase"]) + '</td>'
                '<td>' + fmt_cpu(vmi["cpu_m"]) + '</td>'
                '<td>' + fmt_mib(vmi["mem_mib"]) + '</td>'
                '<td class="vm-node">' + node_txt + '</td>'
                '</tr>'
            )
        ns_rows += (
            '<tr class="node-row" onclick="toggleVMs(this)">'
            '<td class="node-name"><span class="chevron">&#9654;</span> ' + ns + '</td>'
            '<td>' + str(len(nd["vms"])) + '</td>'
            '<td>' + fmt_cpu(nd["cpu_m"]) + '</td>'
            '<td>' + fmt_mib(nd["mem_mib"]) + '</td>'
            '</tr>'
            '<tr class="vm-group hidden">'
            '<td colspan="4"><table class="vm-table">' + vm_rows + '</table></td>'
            '</tr>'
        )
    ns_rows += (
        '<tr class="total-row">'
        '<td>TOTAL</td>'
        '<td>' + str(sum(len(nd["vms"]) for nd in ns_data.values())) + '</td>'
        '<td>' + fmt_cpu(total_cpu) + '</td>'
        '<td>' + fmt_mib(total_mem) + '</td>'
        '</tr>'
    )

    # filter tags
    filter_info = ""
    if filter_node:
        filter_info += '<span class="filter-tag">node: ' + filter_node + '</span>'
    if filter_ns:
        filter_info += '<span class="filter-tag">namespace: ' + filter_ns + '</span>'

    # assemble
    html = (
        '<!DOCTYPE html>\n'
        '<html lang="pl">\n'
        '<head>\n'
        '<meta charset="UTF-8">\n'
        '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n'
        '<title>OCP Virt Overcommit Report</title>\n'
        '<link rel="preconnect" href="https://fonts.googleapis.com">\n'
        '<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600'
        '&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">\n'
        '<style>\n' + CSS + '\n</style>\n'
        '</head>\n'
        '<body>\n'
        '<header>\n'
        '  <div class="header-left">\n'
        '    <h1>OCP<span>/</span>Virt &mdash; Overcommit Report</h1>\n'
        '    <div class="header-meta">Wygenerowano: ' + now + filter_info + '</div>\n'
        '  </div>\n'
        '  <div class="legend">\n'
        '    <span><span class="legend-dot" style="background:var(--ok)"></span>OK</span>\n'
        '    <span><span class="legend-dot" style="background:var(--warn)"></span>Ostrzezenie</span>\n'
        '    <span><span class="legend-dot" style="background:var(--crit)"></span>Krytyczny</span>\n'
        '  </div>\n'
        '</header>\n'
        + cards_html + '\n'
        + warn_panel + '\n'
        '<div class="section">\n'
        '  <div class="section-title">&#9632; Overcommit per Worker Node</div>\n'
        '  <table>\n'
        '    <thead><tr>'
        '<th>Node</th><th>Status</th><th>VM</th>'
        '<th>CPU commit</th><th>CPU alloc</th><th colspan="2">CPU %</th>'
        '<th>MEM commit</th><th>MEM alloc</th><th colspan="2">MEM %</th>'
        '</tr></thead>\n'
        '    <tbody>' + node_rows + '</tbody>\n'
        '  </table>\n'
        '</div>\n'
        '<div class="section">\n'
        '  <div class="section-title">&#9632; Overcommit per Namespace</div>\n'
        '  <table>\n'
        '    <thead><tr>'
        '<th>Namespace</th><th>VM</th><th>CPU commit</th><th>MEM commit</th>'
        '</tr></thead>\n'
        '    <tbody>' + ns_rows + '</tbody>\n'
        '  </table>\n'
        '</div>\n'
        '<footer>OCP Virtualization Overcommit Analyzer'
        ' &bull; prog CPU: ' + "{:.0f}".format(warn_cpu) + '%'
        ' &bull; prog MEM: ' + "{:.0f}".format(warn_mem) + '%'
        '</footer>\n'
        '<script>\n' + JS + '\n</script>\n'
        '</body>\n'
        '</html>\n'
    )
    return html


# ── Main ──────────────────────────────────────────────────────────────────────

def main():
    parser = argparse.ArgumentParser(description="OCP Virtualization overcommit analyzer")
    parser.add_argument("--namespace", "-n",  help="Filtruj po namespace")
    parser.add_argument("--node",      "-N",  help="Filtruj po worker nodzie")
    parser.add_argument("--warn-cpu",  type=float, default=80,
                        help="Prog ostrzezenia CPU w %% (domyslnie 80)")
    parser.add_argument("--warn-mem",  type=float, default=80,
                        help="Prog ostrzezenia MEM w %% (domyslnie 80)")
    parser.add_argument("--html", metavar="PLIK.html",
                        help="Zapisz raport HTML (np. --html raport.html)")
    args = parser.parse_args()

    print(BOLD + "Pobieranie danych z klastra..." + RESET)

    nodes = get_nodes()
    if not nodes:
        print(RED + "Nie udalo sie pobrac danych o nodach." + RESET)
        sys.exit(1)

    vmis = get_vmis(filter_ns=args.namespace)
    if not vmis:
        print(YELLOW + "Brak VMI w klastrze." + RESET)
        sys.exit(0)

    print("Znaleziono {} worker nodow i {} VMI.\n".format(len(nodes), len(vmis)))

    node_data, ns_data = analyze(vmis, nodes, filter_node=args.node,
                                 warn_cpu=args.warn_cpu, warn_mem=args.warn_mem)

    print_node_report(node_data, nodes, args.warn_cpu, args.warn_mem)
    print_namespace_report(ns_data, args.warn_cpu, args.warn_mem)
    print_overcommit_warnings(node_data, nodes, args.warn_cpu, args.warn_mem)

    if args.html:
        html = generate_html(node_data, ns_data, nodes,
                             args.warn_cpu, args.warn_mem,
                             args.node, args.namespace)
        with open(args.html, "w", encoding="utf-8") as f:
            f.write(html)
        print("\n" + GREEN + BOLD + "Raport HTML zapisany: " + RESET + os.path.abspath(args.html))


if __name__ == "__main__":
    main()