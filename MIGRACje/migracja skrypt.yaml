#!/bin/bash
oc get vmi -A -o json | jq -r \
  '.items[] | select(.status.phase == "Pending") | .metadata.namespace + "/" + .metadata.name' | \
while IFS='/' read -r ns name; do
  echo "=== VMI: $name (ns: $ns) ==="
  
  echo "-- NodeSelector:"
  oc get vmi $name -n $ns -o jsonpath='{.spec.nodeSelector}'
  echo ""
  
  echo "-- Affinity:"
  oc get vmi $name -n $ns -o jsonpath='{.spec.affinity}'
  echo ""
  
  echo "-- Events:"
  oc get events -n $ns \
    --field-selector involvedObject.name=$name,involvedObject.kind=VirtualMachineInstance \
    --sort-by='.lastTimestamp' 2>/dev/null | tail -5
  echo "---"
done