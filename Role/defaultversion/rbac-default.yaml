---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: version-reader-cluster-role
rules:
- apiGroups: ["apps"]
  # Dostęp do wersji oprogramowania
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  # Standardowe namespaces (K8s)
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["project.openshift.io"]
  # Projekty widoczne dla komendy 'oc get projects' (OpenShift)
  resources: ["projects"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: read-versions-globally-binding
subjects:
- kind: ServiceAccount
  name: version-collector        # Upewnij się, że nazwa jest poprawna
  namespace: monitoring-tools    # Upewnij się, że projekt jest poprawny
roleRef:
  kind: ClusterRole
  name: version-reader-cluster-role
  apiGroup: rbac.authorization.k8s.io